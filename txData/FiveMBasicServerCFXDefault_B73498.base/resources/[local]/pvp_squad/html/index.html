<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HUD SQUAD (côté écran) -->
    <div id="squadHUD" class="squad-hud hidden">
        <div class="hud-header">
            <span class="hud-icon">⚔</span>
            <span class="hud-name" id="hudSquadName">Squad</span>
            <button class="hud-hide" id="hudHideBtn" title="Masquer">−</button>
        </div>
        <div class="hud-members" id="hudMembers"></div>
    </div>

    <!-- TAB HUD réduit (quand masqué) -->
    <div id="squadTab" class="squad-tab hidden">
        <span class="tab-icon">⚔</span>
        <span class="tab-label" id="tabLabel">Squad</span>
    </div>

    <!-- MENU PRINCIPAL -->
    <div id="app" class="hidden">
        <div class="overlay">

            <!-- PANEL GAUCHE : ma squad -->
            <div class="panel left-panel">
                <div class="panel-header">
                    <span class="panel-title">MA SQUAD</span>
                    <button class="close-btn" id="closeBtn">✕</button>
                </div>

                <!-- Pas de squad -->
                <div id="noSquad" class="no-squad">
                    <div class="no-squad-icon">⚔</div>
                    <div class="no-squad-text">Vous n'êtes dans aucune squad</div>
                    <button class="btn-primary" id="createBtn">+ CRÉER UNE SQUAD</button>
                </div>

                <!-- Ma squad -->
                <div id="mySquadPanel" class="hidden">
                    <div class="squad-info">
                        <div class="squad-name-row">
                            <span class="squad-label">NOM</span>
                            <span class="squad-value" id="mySquadName">—</span>
                        </div>
                        <div class="squad-slots-row">
                            <span class="squad-label">MEMBRES</span>
                            <span class="squad-value"><span id="mySquadSlots">0</span>/10</span>
                        </div>
                        <div class="squad-vis-row">
                            <span class="squad-label">VISIBILITÉ</span>
                            <div class="toggle-wrap">
                                <label class="toggle">
                                    <input type="checkbox" id="visibilityToggle">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="toggle-label" id="visLabel">Privée</span>
                            </div>
                        </div>
                        <div class="squad-hud-row">
                            <span class="squad-label">AFFICHER HUD</span>
                            <div class="toggle-wrap">
                                <label class="toggle">
                                    <input type="checkbox" id="hudToggle" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="toggle-label">Visible</span>
                            </div>
                        </div>
                    </div>

                    <div class="members-title">MEMBRES</div>
                    <div class="members-list" id="myMembersList"></div>

                    <button class="btn-danger" id="leaveBtn">QUITTER LA SQUAD</button>
                </div>
            </div>

            <!-- PANEL DROIT : recherche squads -->
            <div class="panel right-panel">
                <div class="panel-header">
                    <span class="panel-title">SQUADS DISPONIBLES</span>
                </div>
                <div class="squads-list" id="squadsList">
                    <div class="empty-state">Aucune squad disponible</div>
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL CRÉER SQUAD -->
    <div id="createModal" class="modal hidden">
        <div class="modal-box">
            <div class="modal-title">CRÉER UNE SQUAD</div>
            <div class="modal-field">
                <label class="field-label">NOM DE LA SQUAD</label>
                <input type="text" id="squadNameInput" class="field-input" placeholder="Ex: Ashfall Alpha"
                    maxlength="20">
            </div>
            <div class="modal-field">
                <label class="field-label">VISIBILITÉ</label>
                <div class="vis-options">
                    <label class="vis-opt">
                        <input type="radio" name="vis" value="public" checked> Public
                    </label>
                    <label class="vis-opt">
                        <input type="radio" name="vis" value="private"> Privé
                    </label>
                </div>
            </div>
            <div class="modal-btns">
                <button class="btn-primary" id="confirmCreate">CRÉER</button>
                <button class="btn-cancel" id="cancelCreate">ANNULER</button>
            </div>
        </div>
    </div>

    <!-- MODAL DEMANDES D'ADHÉSION -->
    <div id="requestModal" class="request-modal hidden">
        <div class="req-tag">DEMANDE D'ADHÉSION</div>
        <div class="req-name" id="reqName">Joueur</div>
        <div class="req-sub">veut rejoindre votre squad</div>
        <div class="req-btns">
            <button class="btn-primary" id="acceptReqBtn">✓ ACCEPTER</button>
            <button class="btn-danger" id="declineReqBtn">✕ REFUSER</button>
        </div>
    </div>

    <!-- NOTIFICATIONS -->
    <div id="notifs"></div>

    <script src="script.js"></script>
</body>

</html>
