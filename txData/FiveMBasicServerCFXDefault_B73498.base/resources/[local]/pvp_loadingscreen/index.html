<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVP Headshot - Chargement</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="loading-container">
        <!-- Image de fond -->
        <div class="background"></div>

        <!-- Overlay sombre pour la lisibilité -->
        <div class="overlay"></div>

        <!-- Contenu principal -->
        <div class="content">
            <!-- Logo / Titre du serveur (Supprimé car déjà sur l'image) -->
            <div class="logo-container">
            </div>

            <!-- Texte de connexion -->
            <div class="status-container">
                <p class="status-text">CONNEXION AU SERVEUR...</p>

                <!-- Spinner animé -->
                <div class="spinner">
                    <div class="spinner-ring"></div>
                </div>

                <p class="loading-text">CHARGEMENT DES RESSOURCES<br>VEUILLEZ PATIENTER...</p>
            </div>
        </div>

        <!-- Petite étoile décorative en bas à droite -->
        <div class="star">✦</div>
    </div>
</body>
</html>
